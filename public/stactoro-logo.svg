<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 300">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&amp;display=swap');
    </style>
  </defs>

  <!-- Left horn -->
  <path d="M 92 96 Q 62 58 32 10 Q 66 28 88 82 Z" fill="#C9922B"/>
  <!-- Right horn -->
  <path d="M 188 96 Q 218 58 248 10 Q 214 28 192 82 Z" fill="#C9922B"/>

  <!-- Head — single clean shape -->
  <path d="
    M 88 90
    C 60 90 34 106 34 136
    C 34 176 62 208 140 208
    C 218 208 246 176 246 136
    C 246 106 220 90 192 90
    C 176 86 158 82 140 82
    C 122 82 104 86 88 90 Z
  " fill="#9B1111"/>

  <!-- Darker brow band across top of head -->
  <path d="
    M 88 90
    C 104 86 122 82 140 82
    C 158 82 176 86 192 90
    C 178 100 160 104 140 104
    C 120 104 102 100 88 90 Z
  " fill="#7A0C0C"/>

  <!-- Left eye -->
  <ellipse cx="104" cy="138" rx="14" ry="16" fill="#1A0000"/>
  <!-- Right eye -->
  <ellipse cx="176" cy="138" rx="14" ry="16" fill="#1A0000"/>

  <!-- Snout — flat, wide, minimal -->
  <ellipse cx="140" cy="180" rx="40" ry="24" fill="#7A0C0C"/>

  <!-- Dividing line on snout -->
  <line x1="140" y1="158" x2="140" y2="204" stroke="#9B1111" stroke-width="2"/>

  <!-- Wordmark -->
  <text
    x="140" y="258"
    text-anchor="middle"
    font-family="Arial Black, 'Helvetica Neue', Arial, sans-serif"
    font-weight="900"
    font-size="30"
    letter-spacing="6"
    fill="#C9922B"
  >STACTORO</text>

  <!-- Thin rule under wordmark -->
  <line x1="34" y1="268" x2="246" y2="268" stroke="#C9922B" stroke-width="1.5" stroke-opacity="0.4"/>
</svg>
